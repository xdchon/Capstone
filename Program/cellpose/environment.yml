name: cellpose-local
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pyyaml>=6
  - pyzstd>=0.16
  - pip:
      # Install this local fork (from Program/cellpose)
      - -e .
      # GUI extras (kept explicit to avoid editable+extra parsing differences)
      - pyqt6
      - pyqt6-sip
      - pyqtgraph>=0.12.4
      - qtpy
      - superqt
